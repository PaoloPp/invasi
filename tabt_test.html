<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Multi-Select Dropdown</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Styling for the dropdown and selected values container */
        .dropdown-menu {
            max-height: 200px;
            overflow-y: auto;
        }

        .selected-values {
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }

        .selected-values span {
            display: inline-block;
            margin-right: 5px;
            padding: 5px 10px;
            border: 1px solid #007bff;
            border-radius: 3px;
            background-color: #007bff;
            color: #fff;
        }

        .selected-values span:hover {
            background-color: #0056b3;
            cursor: pointer;
        }

        .dropdown-toggle::after {
            display: none;
        }

        .dropdown-menu label {
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container mt-5">
        <h1>Custom Multi-Select Dropdown</h1>

        <!-- Display the selected values dynamically -->
        <div id="selected-values" class="selected-values">
            <strong>Selected:</strong> <em>None</em>
        </div>

        <!-- Custom Dropdown with Checkboxes -->
        <div class="dropdown" id="dropdown-container">
            <button class="btn btn-primary dropdown-toggle" type="button" id="dropdownMenuButton" data-bs-toggle="dropdown"
                aria-expanded="false">
                Select Options
            </button>
            <ul class="dropdown-menu" aria-labelledby="dropdownMenuButton" id="dropdown-menu">
                <li>
                    <label class="dropdown-item">
                        <input type="checkbox" value="Option 1" class="option-checkbox"> Option 1
                    </label>
                </li>
                <li>
                    <label class="dropdown-item">
                        <input type="checkbox" value="Option 2" class="option-checkbox"> Option 2
                    </label>
                </li>
                <li>
                    <label class="dropdown-item">
                        <input type="checkbox" value="Option 3" class="option-checkbox"> Option 3
                    </label>
                </li>
                <li>
                    <label class="dropdown-item">
                        <input type="checkbox" value="Option 4" class="option-checkbox"> Option 4
                    </label>
                </li>
                <li>
                    <label class="dropdown-item">
                        <input type="checkbox" value="Option 5" class="option-checkbox"> Option 5
                    </label>
                </li>
            </ul>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Get references to elements
        const checkboxes = document.querySelectorAll('.option-checkbox');
        const selectedValuesContainer = document.getElementById('selected-values');
        const dropdownMenu = document.getElementById('dropdown-menu');
        const dropdownButton = document.getElementById('dropdownMenuButton');
        const dropdownContainer = document.getElementById('dropdown-container');

        // Handle selecting or deselecting options
        checkboxes.forEach(checkbox => {
            checkbox.addEventListener('change', () => {
                const selectedOptions = Array.from(checkboxes)
                    .filter(cb => cb.checked)
                    .map(cb => cb.value);

                // Clear previous selections
                selectedValuesContainer.innerHTML = `<strong>Selected:</strong> `;

                if (selectedOptions.length === 0) {
                    selectedValuesContainer.innerHTML += `<em>None</em>`;
                } else {
                    selectedOptions.forEach(value => {
                        const span = document.createElement('span');
                        span.textContent = value;
                        selectedValuesContainer.appendChild(span);
                    });
                }
            });
        });

        // Function to close the dropdown
        function closeDropdown() {
            const dropdown = new bootstrap.Dropdown(dropdownButton);
            dropdown.hide();
        }

        // Function to open the dropdown
        function openDropdown() {
            const dropdown = new bootstrap.Dropdown(dropdownButton);
            dropdown.show();
        }

        // Detect click outside to close the dropdown
        document.addEventListener('click', function(event) {
            if (!dropdownContainer.contains(event.target)) {
                closeDropdown();
            } else {
                // Open dropdown when the button is clicked
                openDropdown();
            }
        });
    </script>
</body>

</html>
