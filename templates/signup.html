<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Invasi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  </head>

  <body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="light">
        <div class="container-fluid">
          <a class="navbar-brand" href="{{url_for('register')}}"><h4>Invasi</h4></a>
        </div>
    </nav>

    <section>
        <div class="container text-center mt-5 pt-5">
            <div class="row">
                <div class="col-12 col-sm-8 col-md-6 m-auto">
                    <div class="card text-center">
                        <div class="card-header">
                          <h4>SignUp</h4>
                        </div>
                        <div class="card-body d-flex flex-column align-items-center">
                            <form action="{{url_for('register')}}" method="POST">
                                <input type="text" name="username" class="form-control my-3 py-2 shadow" style="width: 350px; border-width: 2px" placeholder="e-mail">
                                <div id="emailHelp" class="form-text">
                                  {% with messages = get_flashed_messages() %}
                                    {% if messages %}
                                      {% for message in messages %}
                                         {{ message }}
                                      {% endfor %}
                                    {% endif %}
                                  {% endwith %}
                                </div>
                                <input type="password" name="password" class="form-control my-3 py-2 shadow" style="width: 350px; border-width: 2px" placeholder="password">
                                <div class="text-center mt-3">
                                    <button type="submit" class="btn btn-primary shadow">Registrati</button>
                                </div>
                            </form>
                            
                            <!-- Redirect Button for Login -->
                            <div class="mt-3">
                                <a href="{{url_for('login')}}" class="btn btn-secondary">Già registrato? Clicca qui!</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

  </body>
</html>
